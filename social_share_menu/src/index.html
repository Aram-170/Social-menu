<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Share Menu</title>
    <style>
        /* --- RESET E STILE BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Sfondo scuro con sfumatura radiale premium per dare profondità */
            background: radial-gradient(circle at center, #1e2235 0%, #0c0e17 100%);
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* --- CONTENITORE MENU --- */
        .menu {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- PULSANTE CENTRALE (TOGGLE) --- */
        .menu .toggle {
            position: absolute;
            width: 70px;
            height: 70px;
            background: #ffffff;
            border-radius: 50%;
            z-index: 1000;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2em;
            color: #0c0e17;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4), 
                        0 0 0 0px rgba(255, 255, 255, 0.2);
            /* Animazione di rimbalzo fluida */
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        background-all 0.3s, 
                        box-shadow 0.3s;
        }

        /* Effetto hover sul tasto centrale statico */
        .menu .toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* Gestione delle icone dentro il toggle (Share e Chiudi) */
        .menu .toggle .close-icon {
            position: absolute;
            opacity: 0;
            transform: rotate(-90deg) scale(0);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .menu .toggle .share-icon {
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- STATO ATTIVO DEL BOTTONE CENTRALE --- */
        .menu.active .toggle {
            background: #ff3838;
            color: #ffffff;
            box-shadow: 0 0 25px #ff3838;
            transform: scale(0.95);
        }

        .menu.active .toggle .share-icon {
            opacity: 0;
            transform: rotate(90deg) scale(0);
        }

        .menu.active .toggle .close-icon {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        /* --- LISTA DELLE ICONE SOCIAL --- */
        .menu ul {
            position: absolute;
            inset: 0;
            list-style: none;
            pointer-events: none; /* Impedisce click accidentali quando è chiuso */
        }

        .menu.active ul {
            pointer-events: auto; /* Riattiva i click quando il menu si apre */
        }

        .menu ul li {
            position: absolute;
            /* Forza il posizionamento matematico al centro perfetto */
            top: calc(50% - 27.5px); 
            left: calc(50% - 27.5px);
            /* Sposta l'asse di rotazione esattamente a metà del raggio dell'orbita desiderata */
            transform-origin: 27.5px 27.5px; 
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.35);
            /* Ritardo calcolato per creare l'effetto onda ad apertura */
            transition-delay: calc(0.04s * var(--i));
            transform: rotate(calc(360deg / 8 * var(--i))) translate(0px) scale(0);
        }

        /* --- STATO ATTIVO: Esplosione circolare verso l'esterno --- */
        .menu.active ul li {
            /* translate(115px) sposta le icone fuori dal centro creando il cerchio perfetto */
            transform: rotate(calc(360deg / 8 * var(--i))) translate(115px) scale(1);
        }

        /* Stile dei singoli cerchietti dei social */
        .menu ul li a {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 55px;
            height: 55px;
            background: #ffffff;
            border-radius: 50%;
            font-size: 1.6em;
            color: #1e2235;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            /* Controrotazione speculare per tenere le icone sempre dritte verticalmente */
            transform: rotate(calc(-360deg / 8 * var(--i)));
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- EFFETTO HOVER FIGO SUI SOCIAL (Neon Glow) --- */
        .menu ul li:hover a {
            background: var(--clr);
            color: #ffffff;
            /* Ingrandisce l'icona e applica un doppio bagliore colorato progressivo */
            transform: rotate(calc(-360deg / 8 * var(--i))) scale(1.2);
            box-shadow: 0 0 15px var(--clr), 0 0 30px var(--clr);
        }
    </style>
</head>
<body>

    <div class="menu">
        <div class="toggle">
            <ion-icon name="share-social-outline" class="share-icon"></ion-icon>
            <ion-icon name="close-outline" class="close-icon"></ion-icon>
        </div>
            <ul>
            <li style="--i:0; --clr:#000000;">
            <a href="#">
            <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor" style="font-size: 1.1em;">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
        </a>
            </li>
    <li style="--i:1; --clr:#FF4500;"><a href="#"><ion-icon name="logo-reddit"></ion-icon></a></li>
    <li style="--i:2; --clr:#0A66C2;"><a href="#"><ion-icon name="logo-linkedin"></ion-icon></a></li>
    <li style="--i:3; --clr:#E1306C;"><a href="#"><ion-icon name="logo-instagram"></ion-icon></a></li>
    <li style="--i:4; --clr:#24292e;"><a href="#"><ion-icon name="logo-github"></ion-icon></a></li>
    <li style="--i:5; --clr:#FF0000;"><a href="#"><ion-icon name="logo-youtube"></ion-icon></a></li>
    <li style="--i:6; --clr:#1877F2;"><a href="#"><ion-icon name="logo-facebook"></ion-icon></a></li>
    <li style="--i:7; --clr:#25D366;"><a href="#"><ion-icon name="logo-whatsapp"></ion-icon></a></li>
     </ul>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script>
        const toggle = document.querySelector('.toggle');
        const menu = document.querySelector('.menu');

        // Attiva/Disattiva la classe 'active' al click sul pulsante centrale
        toggle.onclick = function() {
            menu.classList.toggle('active');
        }

        // Feature bonus ottimizzata: Se clicchi fuori dal menu, questo si chiude da solo
        document.addEventListener('click', function(event) {
            const isClickInside = menu.contains(event.target);
            if (!isClickInside && menu.classList.contains('active')) {
                menu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
